<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />

    <script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-auth.js"></script>

    <title>RandoMaps | User</title>
  </head>

  <body>
    <main class="container app-shell">
      <header class="row app-header">
        <div class="col-sm-4 col-md-4 text-center text-sm-left">
          <a href="../index.html" aria-label="Back to homepage">
            <img class="logo" src="../assets/images/logo.png" alt="RandoMaps logo" />
          </a>
        </div>
        <div class="col-sm-6 col-md-7">
          <h1>RandoMaps</h1>
          <p class="tagline">Your personalized travel dashboard</p>
        </div>
        <div class="col-sm-2 col-md-1 text-center app-actions">
          <button class="icon-button" type="button" onclick="logout()" aria-label="Sign out">
            <img src="../assets/images/userLogout.png" alt="Sign out icon" />
          </button>
          <a href="mailto:contacto@randomaps.com" aria-label="Contact support by email">
            <img src="../assets/images/userContact.png" alt="Contact icon" />
          </a>
        </div>
      </header>

      <section class="row">
        <div class="col-md-12">
          <h2 id="userTitle"></h2>
          <h3>Choose your filters and generate your next getaway</h3>
        </div>
      </section>

      <section class="row user-panel">
        <div class="col-md-4">
          <label for="distance">Distance</label>
          <select class="form-control" id="distance">
            <option>Select distance</option>
            <option>0 - 50</option>
            <option>50 - 100</option>
            <option>100 - 150</option>
            <option>150 - 200</option>
            <option>200 - 250</option>
            <option>250+</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="travelers">Travelers</label>
          <select class="form-control" id="travelers">
            <option>Select travelers</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5+</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="population">Population</label>
          <select class="form-control" id="population">
            <option>Select population</option>
            <option>0 - 1000</option>
            <option>1000 - 2000</option>
            <option>2000 - 3000</option>
            <option>3000 - 4000</option>
            <option>4000 - 5000</option>
            <option>5000+</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="nights">Nights</label>
          <select class="form-control" id="nights">
            <option>Select nights</option>
            <option>0</option>
            <option>1</option>
            <option>2</option>
            <option>3+</option>
          </select>
        </div>
        <div class="col-md-4 user-actions">
          <button type="button" class="cta-button" onclick="generateRandomTrip()">Generate Trip</button>
        </div>
        <div class="col-md-12">
          <p id="userMessage" class="app-message" aria-live="polite"></p>
        </div>
        <div class="col-md-12">
          <p id="randomTitle" class="random-title"></p>
          <div id="random" class="map-wrap" aria-live="polite"></div>
        </div>
      </section>

      <footer class="row">
        <div class="col-md-12">
          <p class="footer-text">RandoMaps © 2026. All rights reserved.</p>
        </div>
      </footer>
    </main>

    <script src="../assets/js/core/common.js"></script>
    <script src="../assets/js/pages/user.js"></script>
  </body>
</html>
